<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 360" role="img" aria-label="Carro deportivo futurista">
  <defs>
    <linearGradient id="bodyGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.4" stop-color="#d12f45"/>
      <stop offset="1" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#45d6ff"/>
      <stop offset="1" stop-color="#0b78d1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ruedas traseras -->
  <rect x="25" y="30" width="32" height="90" rx="14" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="143" y="30" width="32" height="90" rx="14" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Ruedas delanteras -->
  <rect x="25" y="240" width="32" height="90" rx="14" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="2"/>
  <rect x="143" y="240" width="32" height="90" rx="14" fill="#1a1a1a" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Cuerpo principal -->
  <path d="M 100 15 C 140 15 160 35 170 70 L 175 120 L 175 240 L 170 290 C 160 325 140 345 100 345 C 60 345 40 325 30 290 L 25 240 L 25 120 L 30 70 C 40 35 60 15 100 15 Z" 
        fill="url(#bodyGrad)" stroke="#ffb11c" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Parabrisas delantero superior -->
  <polygon points="85,65 115,65 120,95 80,95" fill="url(#glassGrad)" opacity="0.85"/>
  
  <!-- Ventana principal -->
  <polygon points="70,100 130,100 135,180 65,180" fill="url(#glassGrad)" opacity="0.9"/>
  
  <!-- Zona de carga trasera -->
  <rect x="60" y="200" width="80" height="55" fill="#1a1a1a" opacity="0.6" rx="4"/>
  
  <!-- Luces traseras (rojas) -->
  <rect x="40" y="270" width="20" height="40" fill="#ff544d" rx="4"/>
  <rect x="140" y="270" width="20" height="40" fill="#ff544d" rx="4"/>
  
  <!-- Línea central futurista -->
  <line x1="100" y1="120" x2="100" y2="200" stroke="#45d6ff" stroke-width="3" opacity="0.7" stroke-dasharray="8,8"/>
  
  <!-- Letras/logo MATECARRERAS -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffb11c" 
        text-anchor="middle" opacity="0.8">MATTE</text>
  
  <!-- Detalles de aerodinámica (alas) -->
  <polygon points="25,130 15,140 25,150" fill="#ffb11c" opacity="0.6"/>
  <polygon points="175,130 185,140 175,150" fill="#ffb11c" opacity="0.6"/>
</svg>
